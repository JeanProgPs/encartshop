<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — EncartShop</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
           background:radial-gradient(ellipse 70% 60% at 50% 40%, rgba(99,102,241,0.1) 0%, transparent 70%); }
    .wrap { text-align:center; max-width:480px; }
    .code { font-family:var(--font-display); font-size:6rem; font-weight:900; line-height:1;
            background:linear-gradient(135deg,var(--brand) 0%,var(--accent) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:16px; }
    h1 { font-family:var(--font-display); font-size:1.6rem; font-weight:800; margin-bottom:12px; }
    p  { color:var(--text-muted); margin-bottom:32px; line-height:1.7; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Página não encontrada</h1>
  <p>O endereço que você acessou não existe ou foi movido.<br>Volte para a página inicial.</p>
  <a href="/" class="btn btn-primary btn-lg">← Voltar ao Início</a>
</div>
</body>
</html>
