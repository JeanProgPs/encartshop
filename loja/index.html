<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja — EncartShop</title>
  <meta name="description" content="Confira nossas ofertas e faça seu pedido pelo WhatsApp!">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="shortcut icon" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/favicon.png">
  <link rel="stylesheet" href="../style.css">
  <style>
    body { background: var(--bg); }

    /* Store Header */
    .store-header { background: var(--primary); border-bottom: 1px solid var(--border); padding: 0 20px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
    .store-logo-wrap { display: flex; align-items: center; gap: 10px; }
    .store-logo-icon { width: 38px; height: 38px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: #fff; font-family: var(--font-display); }
    .store-name-text { font-weight: 700; font-size: 1rem; }
    .store-hours { font-size: 0.72rem; color: var(--text-muted); }

    /* Banner */
    .store-banner { background: linear-gradient(90deg, var(--primary-mid), rgba(233,69,96,0.2)); border-bottom: 1px solid var(--border); padding: 10px 20px; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--promo); letter-spacing: 0.02em; }

    /* Main Layout */
    .store-container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 120px; }

    /* Category tabs */
    .cat-tabs-wrap { position: sticky; top: 64px; z-index: 100; background: var(--bg); padding: 12px 0 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }

    /* Products */
    .section-heading { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin: 28px 0 14px; display: flex; align-items: center; gap: 8px; }
    .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Cart Bubble */
    .cart-bubble { position: fixed; bottom: 24px; right: 20px; z-index: 500; background: var(--accent); color: #fff; border-radius: 99px; padding: 14px 22px; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 0.95rem; box-shadow: var(--shadow-accent); cursor: pointer; transition: var(--transition); }
    .cart-bubble:hover { transform: scale(1.05); }
    .cart-bubble.hidden { display: none; }
    .cart-count { background: #fff; color: var(--accent); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 900; }

    /* Cart Modal */
    .cart-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: flex-end; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); }
    .cart-panel { background: var(--bg-card); border-top: 1px solid var(--border); border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 92vh; display: flex; flex-direction: column; animation: slideUp2 0.35s cubic-bezier(0.4,0,0.2,1); }
    @keyframes slideUp2 { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .cart-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 12px auto 0; }
    .cart-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .cart-header h2 { font-size: 1.05rem; font-weight: 700; }
    .cart-body { flex: 1; overflow-y: auto; padding: 0 20px; }
    .cart-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .cart-item-img { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; background: var(--primary); flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 0.875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { font-size: 0.8rem; color: var(--accent); font-weight: 700; margin-top: 2px; }
    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-btn { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,0.07); border: none; color: var(--text); font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .qty-btn:hover { background: rgba(255,255,255,0.15); }
    .qty-num { font-weight: 700; font-size: 0.9rem; min-width: 20px; text-align: center; }
    .cart-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 14px; }
    .cart-subtotals { display: flex; flex-direction: column; gap: 6px; }
    .cart-row { display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-muted); }
    .cart-total-row { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .checkout-form { display: flex; flex-direction: column; gap: 10px; }

    /* Promo Section Highlight */
    .promo-section { background: linear-gradient(135deg, rgba(233,69,96,0.06) 0%, transparent 100%); border: 1px solid rgba(233,69,96,0.15); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 8px; }

    /* Store Info Bar */
    .store-info-bar { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 20px; margin-bottom: 24px; }
    .info-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-muted); }
    .info-item strong { color: var(--text); }

    @media (min-width: 600px) {
      .cart-modal { align-items: center; }
      .cart-panel { border-radius: 20px; max-height: 85vh; margin: 16px; }
    }
  </style>
</head>
<body>

<!-- Store Header -->
<header class="store-header">
  <div class="store-logo-wrap">
    <div class="store-logo-icon" id="store-logo-icon">7</div>
    <div>
      <div class="store-name-text" id="header-store-name">Carregando...</div>
      <div class="store-hours" id="header-hours"></div>
    </div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="openCart()" id="header-cart-btn" style="display:none;">
    🛒 <span id="header-cart-count">0</span>
  </button>
</header>

<!-- Banner -->
<div class="store-banner" id="store-banner"></div>

<!-- Main Content -->
<div class="store-container">

  <!-- Store Info Bar -->
  <div class="store-info-bar" id="store-info-bar"></div>

  <!-- Category Tabs -->
  <div class="cat-tabs-wrap">
    <div class="category-tabs" id="cat-tabs"></div>
  </div>

  <!-- Products -->
  <div id="products-area"></div>
</div>

<!-- Cart Bubble -->
<div class="cart-bubble hidden" id="cart-bubble" onclick="openCart()">
  <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
  <span>Ver Carrinho</span>
  <div class="cart-count" id="cart-count">0</div>
</div>

<!-- Cart Modal -->
<div class="cart-modal hidden" id="cart-modal">
  <div class="cart-panel">
    <div class="cart-handle"></div>
    <div class="cart-header">
      <h2>🛒 Meu Carrinho</h2>
      <button class="btn btn-ghost btn-icon" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-body" id="cart-body"></div>
    <div class="cart-footer">
      <div class="cart-subtotals" id="cart-subtotals"></div>
      <div class="checkout-form">
        <input id="customer-name" type="text" class="form-input" placeholder="Seu nome completo *">
        <input id="customer-address" type="text" class="form-input" placeholder="Endereço de entrega (ou 'Retirada')">
        <button class="btn btn-success btn-lg w-full" onclick="checkout()" id="whatsapp-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Finalizar pelo WhatsApp
        </button>
      </div>
    </div>
  </div>
</div>

<footer style="text-align:center; padding:40px 20px; border-top:1px solid var(--border); margin-top:60px; opacity:0.6;">
  <div style="display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:8px;">
    <div style="width:28px;height:28px;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    </div>
    <span style="font-weight:700;font-size:0.9rem;">EncartShop</span>
  </div>
  <p style="font-size:0.75rem; color:var(--text-muted);">© 2026 EncartShop — Plataforma de Vendas pelo WhatsApp</p>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/core/supabaseClient.js"></script>
<script src="../js/core/api.js"></script>
<script src="../js/modules/store.js"></script>
<script src="../js/ui/render.js"></script>
<script src="../js/storage.js"></script>
<script src="loja.js"></script>
</body>
</html>
