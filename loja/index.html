  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── Reset loja ──────────────────────────────────────────── */
    body { background: var(--bg); }

    /* ── Header ─────────────────────────────────────────────── */
    .store-header {
      background: var(--primary); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .store-logo-wrap { display: flex; align-items: center; gap: 10px; }
    .store-logo-icon {
      width: 38px; height: 38px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1rem; color: #fff;
    }
    .store-name-text { font-weight: 700; font-size: 1rem; }

    /* Header cart button */
    .header-cart-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--brand); color: #fff;
      border: none; border-radius: 10px;
      padding: 8px 14px; cursor: pointer;
      font-weight: 700; font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    .header-cart-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .header-cart-badge {
      background: #fff; color: var(--brand);
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 900;
    }

    /* ── Banner ──────────────────────────────────────────────── */
    .store-banner-area {
      background: linear-gradient(135deg, var(--brand-glow, rgba(79,70,229,0.06)) 0%, transparent 60%);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px; text-align: center;
    }
    .store-banner-area h2 {
      font-size: 0.95rem; font-weight: 600; color: var(--brand);
      letter-spacing: 0.01em;
    }
    .store-banner-area p { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Tabs ────────────────────────────────────────────────── */
    .cat-tabs-container {
      position: sticky; top: 64px; z-index: 100;
      background: var(--primary); border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }
    .cat-tabs-scroll {
      display: flex; gap: 4px; overflow-x: auto;
      padding: 10px 0; scrollbar-width: none;
    }
    .cat-tabs-scroll::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0; padding: 7px 16px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 600; white-space: nowrap;
      cursor: pointer; transition: all 0.2s ease;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--text-muted);
    }
    .cat-tab:hover { border-color: var(--brand); color: var(--brand); }
    .cat-tab.active {
      background: var(--brand); border-color: var(--brand); color: #fff;
      box-shadow: 0 4px 12px var(--brand-glow, rgba(79,70,229,0.2));
    }

    /* ── Main content ────────────────────────────────────────── */
    #main-content { padding: 0 16px; padding-bottom: calc(96px + env(safe-area-inset-bottom)); max-width: 900px; margin: 0 auto; }

    /* ── Grupo de categoria ──────────────────────────────────── */
    .category-group { margin-top: 28px; }
    .category-group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    .category-group-title {
      font-size: 1rem; font-weight: 800; color: var(--text);
      font-family: var(--font-display, 'Outfit', sans-serif);
    }
    .category-group-count {
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      background: var(--border); border-radius: 999px;
      padding: 2px 8px;
    }
    .category-group-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    /* ── Cart Bottom Bar (iFood style) ───────────────────────── */
    #cart-bubble {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 500;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: transparent;
      cursor: pointer; user-select: none;
      transform: translateY(110%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease;
    }
    #cart-bubble.cart-visible {
      transform: translateY(0);
      opacity: 1;
    }
    .cart-bar-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; max-width: 560px; margin: 0 auto;
      background: linear-gradient(135deg, color-mix(in srgb, var(--brand) 94%, transparent) 0%, color-mix(in srgb, var(--brand-dark, var(--brand)) 94%, transparent) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px; padding: 12px 18px;
      color: #fff;
      pointer-events: auto;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22), 0 4px 12px var(--brand-glow, rgba(0,0,0,0.15));
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s ease;
    }
    .cart-bar-inner:active {
      transform: scale(0.98);
      filter: brightness(0.92);
    }
    .cart-bar-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .cart-bar-badge {
      background: #fff; color: var(--brand);
      border-radius: 8px; min-width: 32px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.88rem; font-weight: 900; padding: 0 7px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: transform 0.2s ease;
    }
    #cart-bubble.cart-visible .cart-bar-badge { animation: badgePop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes badgePop { from { transform: scale(0.7); } to { transform: scale(1); } }
    .cart-bar-info { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; }
    .cart-bar-cta { flex: 1; text-align: center; font-size: 0.9rem; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
    .cart-bar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .cart-bar-total {
      font-size: 0.95rem; font-weight: 800; color: #fff;
      font-family: var(--font-display, 'Outfit', sans-serif);
      transition: opacity 0.18s ease;
    }
    .cart-bar-arrow {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* ── Cart Drawer (bottom-sheet premium) ──────────────────── */
    #cart-modal {
      position: fixed; inset: 0; z-index: 9000;
      display: flex; align-items: flex-end; justify-content: center;
      background: rgba(15,23,42,0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: opacity 0.3s ease;
    }
    #cart-modal.hidden { display: none; }

    .cart-drawer {
      background: var(--bg-card, #fff);
      width: 100%; max-width: 540px;
      border-radius: 24px 24px 0 0;
      max-height: 92vh;
      display: flex; flex-direction: column;
      animation: drawerUp 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
      box-shadow: 0 -8px 48px rgba(0,0,0,0.15);
    }
    @keyframes drawerUp {
      from { transform: translateY(100%); opacity: 0.6; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Handle */
    .cart-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 12px auto 0;
      flex-shrink: 0;
    }

    /* Drawer header */
    .cart-drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cart-drawer-title {
      font-size: 1.1rem; font-weight: 800;
      font-family: var(--font-display, 'Outfit', sans-serif);
      display: flex; align-items: center; gap: 8px;
    }
    .cart-drawer-badge {
      font-size: 0.72rem; font-weight: 700;
      background: var(--brand); color: #fff;
      padding: 2px 8px; border-radius: 999px;
    }
    .cart-close-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--border); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--text-muted);
      transition: all 0.2s;
    }
    .cart-close-btn:hover { background: var(--text-muted); color: #fff; }

    /* Items list */
    .cart-items-list {
      flex: 1; overflow-y: auto; padding: 12px 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .cart-item-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 12px;
      background: var(--primary-light, #f8fafc);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .cart-item-row:hover { border-color: var(--brand); }
    .cart-item-img {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: var(--border);
    }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name {
      font-size: 0.875rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cart-item-price { font-size: 0.8rem; color: var(--brand); font-weight: 700; }
    .cart-item-unit-price { font-size: 0.72rem; color: var(--text-muted); }

    .cart-qty-control {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .cart-qty-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--primary-mid, #f1f5f9); border: 1px solid var(--border);
      font-size: 1rem; font-weight: 700; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .cart-qty-btn:hover { background: var(--brand); color: #fff; border-color: var(--brand); }
    .cart-qty-btn.remove { color: var(--danger, #ef4444); }
    .cart-qty-btn.remove:hover { background: var(--danger, #ef4444); color: #fff; border-color: var(--danger, #ef4444); }
    .cart-qty-num {
      min-width: 32px; text-align: center;
      font-size: 0.875rem; font-weight: 800; color: var(--text);
    }

    /* Empty cart */
    .cart-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px 24px; gap: 12px;
      color: var(--text-muted);
    }
    .cart-empty-icon { font-size: 3rem; opacity: 0.5; }
    .cart-empty-text { font-size: 0.9rem; font-weight: 500; }

    /* Footer */
    .cart-drawer-footer {
      border-top: 1px solid var(--border);
      padding: 16px 20px; flex-shrink: 0;
      background: var(--bg-card, #fff);
    }
    .cart-summary { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .cart-summary-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85rem; color: var(--text-light, #475569);
    }
    .cart-summary-total {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 1.1rem; font-weight: 800; color: var(--text);
      padding-top: 10px; border-top: 1px solid var(--border); margin-top: 4px;
    }
    .cart-total-value { color: var(--brand); font-family: var(--font-display, 'Outfit', sans-serif); }
    .cart-free-ship {
      text-align: center; font-size: 0.75rem;
      color: var(--success, #10b981); font-weight: 600; margin-top: 6px;
    }
    .cart-progress-wrap { margin: 6px 0 10px; }
    .cart-progress-bar {
      height: 4px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .cart-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--brand), var(--success, #10b981));
      border-radius: 4px; transition: width 0.4s ease;
    }
    .cart-progress-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; text-align: center; }

    /* Name input */
    .cart-name-wrap { margin-bottom: 12px; }
    .cart-name-label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }
    .cart-name-input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--primary-light, #f8fafc);
      font-size: 0.95rem; color: var(--text); font-family: inherit;
      transition: border-color 0.2s;
    }
    .cart-name-input:focus { outline: none; border-color: var(--brand); }

    /* WhatsApp button */
    .btn-whatsapp {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: #fff; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 800; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(34,197,94,0.3);
      font-family: inherit;
    }
    .btn-whatsapp:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(34,197,94,0.4); }
    .btn-whatsapp:active { transform: scale(0.99); }
    .btn-whatsapp:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-whatsapp svg { width: 20px; height: 20px; fill: currentColor; flex-shrink: 0; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (min-width: 540px) {
      #main-content { padding: 0 24px; padding-bottom: calc(110px + env(safe-area-inset-bottom)); }
      #cart-bubble { padding: 12px 24px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
      .cart-bar-inner { border-radius: 16px; padding: 13px 20px; }
      .cart-drawer { border-radius: 24px 24px 0 0; }
      .product-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 16px; }
    }
    @media (max-width: 360px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    }
  </style>

<main id="main-content">

  <div id="fashion-hero-area"></div>

<!-- Cart Bottom Bar (iFood style) -->

<footer style="text-align:center;padding:40px 20px;border-top:1px solid var(--border);margin-top:20px;">
