<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Carregando Loja... | EncartShop</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="premium.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="public-store">

  <!-- App Header -->
  <header class="store-header">
    <div class="container header-inner">
      <div class="store-info-compact">
        <div id="store-logo" class="store-logo">🏪</div>
        <div>
          <h1 id="header-store-name" class="store-name-text">Carregando...</h1>
          <div id="header-status" style="font-size: 0.75rem; color: var(--accent); font-weight: 600;">● Aberto agora</div>
        </div>
      </div>
      <button id="header-cart-btn" class="hidden" onclick="openCart()" style="position: relative;">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span id="header-cart-badge" style="position: absolute; top: -5px; right: -5px; background: var(--brand); color: #fff; width: 20px; height: 20px; border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid #fff;">0</span>
      </button>
    </div>
  </header>

  <main>
    <!-- Store Info / Trust Banner -->
    <section class="container" style="margin-top: var(--space-md);">
      <div id="store-trust-card" class="skeleton" style="height: 120px; border-radius: var(--radius); padding: var(--space-md); display: flex; flex-direction: column; justify-content: center; background: var(--bg-card); border: 1px solid var(--border);">
        <!-- Injetado via JS -->
      </div>
    </section>

    <!-- Search & Filters -->
    <section class="search-container">
      <div class="container">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="store-search" class="search-input" placeholder="O que você está procurando?">
        </div>
        <nav id="cat-tabs-area" class="hidden">
          <div id="cat-tabs" class="category-scroller"></div>
        </nav>
      </div>
    </section>

    <!-- Product Grid -->
    <section class="container" style="padding-bottom: 120px;">
      <div id="products-area" class="product-grid">
         <!-- Skeletons injetados via JS -->
      </div>
    </section>
  </main>

  <!-- Sticky Cart Bar -->
  <div id="cart-bar" class="cart-sticky-bar hidden" onclick="openCart()">
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">🛒</div>
      <div>
        <div id="cart-count-text" style="font-weight: 700; font-size: 0.9rem;">0 itens no pedido</div>
        <div style="font-size: 0.7rem; opacity: 0.9;">Clique para revisar</div>
      </div>
    </div>
    <div id="cart-total-preview" style="font-size: 1.2rem; font-weight: 900;">R$ 0,00</div>
  </div>

  <!-- App Drawer (Cart) -->
  <div id="drawer-overlay" class="drawer-overlay" onclick="closeCart()">
    <div class="drawer-content" onclick="event.stopPropagation()">
      <div class="drawer-header">
        <h2 style="font-size: 1.25rem;">Meu Pedido</h2>
        <button onclick="closeCart()" style="font-size: 1.5rem; color: var(--text-muted);">&times;</button>
      </div>
      
      <div id="cart-items-list" class="drawer-body">
        <!-- Itens do carrinho -->
      </div>

      <div class="drawer-footer">
        <div class="cart-summary" style="margin-bottom: var(--space-lg);">
          <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-sm); color: var(--text-light);">
            <span>Subtotal</span>
            <span id="cart-subtotal">R$ 0,00</span>
          </div>
          <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 1.25rem; color: var(--text);">
            <span>Total</span>
            <span id="cart-total">R$ 0,00</span>
          </div>
        </div>

        <div style="margin-bottom: var(--space-lg);">
          <label style="display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-light); margin-bottom: 8px;">OBSERVAÇÕES DO PEDIDO</label>
          <textarea id="order-obs" placeholder="Ex: Sem cebola, trocar molho..." style="width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-size: 0.9rem; resize: none;" rows="2"></textarea>
        </div>

        <button id="whatsapp-btn" class="btn-whatsapp" onclick="sendToWhatsApp()">
          <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.817 9.817 0 0 0 12.04 2m.01 1.67c2.2 0 4.26.86 5.82 2.42a8.182 8.182 0 0 1 2.41 5.82c0 4.52-3.67 8.19-8.19 8.19-1.53 0-3.06-.43-4.39-1.24l-.31-.19-3.26.86.87-3.17-.21-.33c-.88-1.41-1.35-3.04-1.35-4.72 0-4.52 3.68-8.19 8.21-8.19m-3.11 4.64c-.17 0-.45.06-.69.32-.24.25-.92.9-.92 2.2 0 1.3.95 2.56 1.08 2.73.13.17 1.87 2.85 4.53 4 .63.27 1.13.44 1.51.56.64.2 1.22.17 1.67.1.51-.07 1.57-.64 1.79-1.26.22-.61.22-1.14.15-1.26-.07-.12-.25-.18-.53-.32-.28-.14-1.66-.82-1.92-.91-.26-.09-.45-.14-.64.14-.19.28-.73.91-.89 1.1-.16.19-.32.21-.61.07-.28-.14-1.2-.44-2.28-1.41-.84-.75-1.41-1.68-1.57-1.97-.17-.28-.02-.44.12-.58.13-.12.28-.32.42-.48.14-.16.18-.28.28-.46.1-.18.05-.33-.02-.47-.07-.14-.64-1.54-.87-2.11-.23-.55-.47-.48-.64-.49"/></svg>
          <span>Pedir no WhatsApp</span>
        </button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/core/supabaseClient.js"></script>
  <script src="/js/core/helpers.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/auth/authService.js"></script>
  <script src="/js/modules/store.js"></script>
  <script src="/js/modules/orders.js"></script>
  <script src="/js/modules/subscription.js"></script>
  <script src="/js/ui/components.js"></script>
  <script src="/js/ui/render.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/loja/loja.js"></script>
</body>
</html>
