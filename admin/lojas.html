<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Lojas — EncartShop</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="shortcut icon" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <style>
    .stores-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
    .store-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-xl); overflow:hidden; transition:var(--transition);
    }
    .store-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-lg); }
    .store-card-header {
      height:80px; display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; position:relative;
    }
    .store-card-header::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg, rgba(0,0,0,0.2) 0%, transparent 100%);
    }
    .store-card-logo {
      width:48px; height:48px; border-radius:14px;
      background:rgba(255,255,255,0.2); backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:1.3rem; color:#fff;
      font-family:var(--font-display); position:relative; z-index:1;
    }
    .store-card-tag {
      background:rgba(255,255,255,0.2); backdrop-filter:blur(4px);
      border-radius:99px; padding:4px 10px; font-size:0.7rem;
      font-weight:700; color:#fff; position:relative; z-index:1; letter-spacing:0.05em;
    }
    .store-card-body { padding:18px 20px; }
    .store-card-name { font-size:1rem; font-weight:700; margin-bottom:4px; }
    .store-card-meta { font-size:0.78rem; color:var(--text-muted); margin-bottom:14px; line-height:1.5; }
    .store-card-stats { display:flex; gap:16px; margin-bottom:16px; }
    .store-stat { text-align:center; }
    .store-stat-num { font-size:1.1rem; font-weight:800; font-family:var(--font-display); }
    .store-stat-label { font-size:0.68rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; }
    .store-card-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .mobile-menu-btn { display:none; background:none; border:none; color:var(--text); cursor:pointer; padding:8px; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }
    @media(max-width:768px){
      .mobile-menu-btn{display:flex;} .sidebar-overlay.show{display:block;}
      .stores-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">ES</div>
        <div class="logo-text"><span class="brand">EncartShop</span><span class="sub" id="store-name-nav">Gerenciador</span></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Loja Atual</span>
      <a href="dashboard.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a href="produtos.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Produtos</a>
      <a href="pedidos.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Pedidos</a>
      <span class="nav-section-label" style="margin-top:8px;">Sistema</span>
      <a href="lojas.html" class="nav-item active"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Gerenciar Lojas</a>
      <a href="configuracoes.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Configurações</a>
    </nav>
    <div class="sidebar-footer">
      <button onclick="SevenStorage.logout();window.location.href='index.html'" class="nav-item w-full" style="text-align:left;color:var(--danger);">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sair
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-menu-btn" onclick="openSidebar()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title">Gerenciar Lojas</span>
      </div>
      <a href="setup.html" class="btn btn-primary btn-sm">+ Nova Loja</a>
    </header>

    <div class="page-content">
      <div id="stores-grid" class="stores-grid"></div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/core/supabaseClient.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/admin-common.js"></script>
<script>
  SevenStorage.requireAuth();

  function slugify(text) {
    if (!text) return '';
    return text.toString().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, '-')
      .replace(/[^\w\-]+/g, '')
      .replace(/\-\-+/g, '-')
      .replace(/^-+/, '')
      .replace(/-+$/, '');
  }

  function getStoreUrl(storeName) {
    const slug = slugify(storeName || 'loja');
    return `${window.location.origin}/loja/index.html?s=${slug}`;
  }

  function enterStore(id) {
    const auth = JSON.parse(localStorage.getItem(`seven_auth_${id}`) || 'null');
    // Already logged in to a store — switch active
    SevenStorage.setActiveStoreId(id);
    sessionStorage.setItem('seven_session', 'active');
    window.location.href = 'dashboard.html';
  }

  async function deleteStore(id, name) {
    if (!confirm(`⚠️ Excluir a loja "${name}"?\n\nTodos os produtos, pedidos e configurações serão apagados permanentemente.`)) return;
    const activeId = SevenStorage.getActiveStoreId();
    await SevenStorage.deleteStore(id);
    if (activeId === id) {
      SevenStorage.logout();
      window.location.href = 'index.html';
      return;
    }
    await renderStores();
    showToast('Loja excluída.', 'info');
  }

  function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => showToast('Link copiado!', 'success'));
  }

  async function renderStores() {
    const stores  = await SevenStorage.getAllStores();
    const activeId = SevenStorage.getActiveStoreId();
    const grid     = document.getElementById('stores-grid');

    if (!stores || stores.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🏪</div><h3>Nenhuma loja cadastrada</h3><p>Crie sua primeira loja para começar.</p><a href="setup.html" class="btn btn-primary" style="margin-top:16px;">+ Criar Loja</a></div>`;
      return;
    }

    let html = '';
    for (const s of stores) {
      const prodsList = await SevenStorage.getProducts(s.id);
      const prods  = prodsList.filter(p => p.active).length;
      const ordersList = await SevenStorage.getOrders(s.id);
      const orders = ordersList.length;
      const newOrds = ordersList.filter(o => o.status === 'novo').length;
      const isActive = s.id === activeId;
      const slug = slugify(s.name || 'loja');
      const lojaUrl = `../loja/index.html?s=${slug}`;
      
      html += `
        <div class="store-card">
          <div class="store-card-header" style="background:linear-gradient(135deg, ${s.color} 0%, ${s.color}aa 100%);">
            <div class="store-card-logo">7</div>
            ${isActive ? '<span class="store-card-tag">✓ Loja Atual</span>' : ''}
          </div>
          <div class="store-card-body">
            <div class="store-card-name">${s.name}</div>
            <div class="store-card-meta">
              ${SevenStorage.getStore(s.id).address || 'Endereço não configurado'}<br>
              <span style="color:${s.color};font-weight:600;">●</span> ${s.color}
            </div>
            <div class="store-card-stats">
              <div class="store-stat">
                <div class="store-stat-num" style="color:${s.color};">${prods}</div>
                <div class="store-stat-label">Produtos</div>
              </div>
              <div class="store-stat">
                <div class="store-stat-num">${orders}</div>
                <div class="store-stat-label">Pedidos</div>
              </div>
              ${newOrds > 0 ? `<div class="store-stat"><div class="store-stat-num" style="color:var(--info);">${newOrds}</div><div class="store-stat-label">Novos</div></div>` : ''}
            </div>
            <div class="store-card-actions">
              <button class="btn btn-primary btn-sm" style="flex:1;background:${s.color};" onclick="enterStore('${s.id}')">
                ${isActive ? '→ Painel' : '🔑 Entrar'}
              </button>
              <a href="${lojaUrl}" target="_blank" class="btn btn-ghost btn-sm btn-icon" title="Ver Loja">👁️</a>
              <button class="btn btn-ghost btn-sm btn-icon" title="Copiar Link" onclick="copyLink('${lojaUrl}')">🔗</button>
              <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--danger);" title="Excluir" onclick="deleteStore('${s.id}','${s.name}')">🗑️</button>
            </div>
          </div>
        </div>`;
    }
    grid.innerHTML = html;
  }

  renderStores();
</script>
</body>
</html>
