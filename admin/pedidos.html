<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — EncartShop</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgPrimary: 'var(--bg-primary)',
            bgSecondary: 'var(--bg-secondary)',
            cardBg: 'var(--card-bg)',
            borderColor: 'var(--border-color)',
            textPrimary: 'var(--text-primary)',
            textSecondary: 'var(--text-secondary)',
            accent: 'var(--accent)',
            success: 'var(--success)',
            warning: 'var(--warning)',
            danger: 'var(--danger)',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          boxShadow: {
            'card': '0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.03)',
            'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.02)',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    .filter-bar { display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center; }
    .filter-tab { padding:8px 16px;border-radius:99px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:var(--transition);border:1.5px solid var(--border-color);background:var(--bg-primary);color:var(--text-secondary); }
    .filter-tab:hover  { border-color:var(--text-primary);color:var(--text-primary); }
    .filter-tab.active { background:var(--text-primary);border-color:var(--text-primary);color:#fff; }
    .filter-tab .count { display:inline-block;background:rgba(255,255,255,0.2);border-radius:99px;padding:1px 7px;font-size:0.72rem;margin-left:6px; }

    @keyframes order-glow {
      0% { border-color: var(--accent); box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.1); }
      50% { border-color: var(--success); box-shadow: 0 0 15px 4px rgba(16, 185, 129, 0.2); }
      100% { border-color: var(--border-color); box-shadow: 0 0 0 0 transparent; }
    }
    .order-highlight { animation: order-glow 3s ease-in-out; border-width: 1.5px !important; }
    
    .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(10px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    
    .hover-scale { transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease; }
    .hover-scale:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  </style>
</head>
<body data-page="pedidos" class="bg-bgPrimary text-textPrimary antialiased selection:bg-accent selection:text-white">

<div class="admin-layout flex min-h-screen">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content flex-1 ml-0 md:ml-[256px] flex flex-col min-h-screen transition-all duration-300">
    
    <header class="h-[64px] bg-cardBg/80 backdrop-blur-md border-b border-borderColor sticky top-0 z-50 px-4 md:px-8 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <h2 class="text-sm font-semibold text-textPrimary leading-tight hidden md:block">Pedidos</h2>
      </div>
      <div class="flex items-center gap-3">
        <span id="new-orders-badge" class="px-2.5 py-1 text-xs font-bold bg-info/10 text-info border border-info/20 rounded-full" style="display:none;"></span>
        <button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-bgPrimary transition-colors relative">
          <i data-lucide="bell" class="w-5 h-5 text-textSecondary"></i>
        </button>
      </div>
    </header>

    <div class="flex-1 p-4 md:p-8 flex flex-col gap-6 max-w-[1000px] w-full mx-auto fade-in-up">
      
      <div class="filter-bar" id="filter-bar">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">
          Todos <span class="count" id="cnt-all">0</span>
        </button>
        <button class="filter-tab" data-filter="novo" onclick="setFilter('novo',this)">
          Novos <span class="count" id="cnt-novo">0</span>
        </button>
        <button class="filter-tab" data-filter="confirmado" onclick="setFilter('confirmado',this)">
          Confirmados <span class="count" id="cnt-confirmado">0</span>
        </button>
        <button class="filter-tab" data-filter="em_entrega" onclick="setFilter('em_entrega',this)">
          Em Entrega <span class="count" id="cnt-em_entrega">0</span>
        </button>
        <button class="filter-tab" data-filter="finalizado" onclick="setFilter('finalizado',this)">
          Finalizados <span class="count" id="cnt-finalizado">0</span>
        </button>
        <button class="filter-tab" data-filter="cancelado" onclick="setFilter('cancelado',this)">
          Cancelados <span class="count" id="cnt-cancelado">0</span>
        </button>
      </div>

      <div id="orders-list" class="flex flex-col"></div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/core/helpers.js"></script>
<script src="/js/core/supabaseClient.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/auth/authService.js"></script>
<script src="/js/modules/subscription.js"></script>
<script src="/js/auth/authGuard.js"></script>
<script src="/js/modules/store.js"></script>
<script src="/js/modules/orders.js"></script>
<script src="/js/ui/components.js"></script>
<script src="/js/ui/render.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/admin-common.js"></script>
<script>
  lucide.createIcons();
  let currentFilter = 'all';
  let allOrders     = [];
  const storeId     = () => AuthService.getActiveStoreId();

  async function initAdmin() {
    document.getElementById('orders-list').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:16px;">
        ${Array.from({length:3}).map((_,i) => `
          <div class="h-32 bg-cardBg border border-borderColor rounded-xl animate-pulse"></div>`).join('')}
      </div>`;
    try {
      await renderOrders();
      
      const urlParams = new URLSearchParams(window.location.search);
      const searchRef = urlParams.get('ref');
      if (searchRef) {
        const refUpper = searchRef.toUpperCase();
        const matchedOrder = allOrders.find(o => {
          const nameMatch = o.customer_name && o.customer_name.toUpperCase().includes(`#${refUpper}`);
          const idMatch = o.id && String(o.id).toUpperCase().endsWith(refUpper);
          return nameMatch || idMatch;
        });

        if (matchedOrder) {
          currentFilter = 'all';
          document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
          const allTab = document.querySelector('.filter-tab[data-filter="all"]');
          if (allTab) allTab.classList.add('active');
          
          renderOrderList();

          setTimeout(() => {
            const card = document.getElementById(`order-${matchedOrder.id}`);
            if (card) {
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
              card.classList.add('order-highlight');
              if (window.showToast) showToast(`Pedido #${searchRef} localizado e destacado!`, 'success');
            }
          }, 400);
        } else {
          if (window.showToast) showToast(`Pedido com a referência #${searchRef} não foi encontrado.`, 'warning');
        }
      }
    } catch(err) {
      console.error('[Pedidos] Erro ao carregar:', err);
      document.getElementById('orders-list').innerHTML = UIRender.emptyState('⚠️', 'Erro ao carregar pedidos', 'Tente recarregar a página.');
      if (window.showToast) showToast('Erro ao carregar pedidos.', 'error');
    }
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrderList();
  }

  async function renderOrders() {
    allOrders = await OrdersModule.getAll(storeId());
    updateCounts();
    renderOrderList();
  }

  function updateCounts() {
    const counts = OrdersModule.countByStatus(allOrders);
    document.getElementById('cnt-all').textContent       = counts.all       || 0;
    document.getElementById('cnt-novo').textContent      = counts.novo      || 0;
    document.getElementById('cnt-confirmado').textContent= counts.confirmado|| 0;
    document.getElementById('cnt-em_entrega').textContent= counts.em_entrega|| 0;
    document.getElementById('cnt-finalizado').textContent= counts.finalizado || 0;
    document.getElementById('cnt-cancelado').textContent = counts.cancelado  || 0;

    const badge = document.getElementById('new-orders-badge');
    if (counts.novo > 0) { badge.textContent = `${counts.novo} novo(s)`; badge.style.display = ''; }
    else badge.style.display = 'none';
  }

  function renderOrderList() {
    const filtered = OrdersModule.filter(allOrders, currentFilter);
    const list = document.getElementById('orders-list');
    if (!filtered.length) {
      list.innerHTML = UIRender.emptyState('🛒', 'Nenhum pedido', 'Os pedidos aparecerão aqui assim que os clientes finalizarem pelo WhatsApp.');
      return;
    }
    list.innerHTML = filtered.map(o => UIRender.orderAdminCard(o)).join('');
    setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 10);
  }

  async function handleOrderStatus(btn) {
    const orderId       = btn.dataset.orderId;
    const currentStatus = btn.dataset.currentStatus;
    const newStatus     = btn.dataset.newStatus;

    const { success, error } = await OrdersModule.updateStatus(orderId, currentStatus, newStatus);
    if (success) {
      showToast(`Status atualizado: ${OrdersModule.getStatusLabel(newStatus)}`, 'success');
      await renderOrders();
    } else {
      showToast(error || 'Falha ao atualizar status.', 'error');
    }
  }

  async function handleDeleteOrder(id) {
    if (!confirm('Excluir este pedido?')) return;
    await OrdersModule.remove(id);
    await renderOrders();
    showToast('Pedido excluído.', 'info');
  }

  initAdmin();
</script>
</body>
</html>
